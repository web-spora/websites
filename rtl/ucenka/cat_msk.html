<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Уценка на складе в Москве</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Уценка на складе в Москве</h1>

  <div id="filters">
    <div class="filter-group">
      <label>Продавец</label>
      <select id="filter-org">
        <option value="all">Все</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Бренд</label>
      <select id="filter-brand">
        <option value="all">Все</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Назначение</label>
      <select id="filter-cat">
        <option value="all">Все</option>
        <option value="Моторное">Моторное</option>
        <option value="Трансмиссионное">Трансмиссионное</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Остаток</label>
      <select id="filter-qty">
        <option value="all">Все</option>
        <option value="asc">По возрастанию</option>
        <option value="desc">По убыванию</option>
      </select>
    </div>
  </div>

  <div id="summary"></div>

  <div id="container" class="cards-container">
    <div class="loading">Загрузка данных...</div>
  </div>

  <script src="script_msk.js"></script>

</body>
</html>
